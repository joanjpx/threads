upstream laravel_app {
    server app:9000;
    # Si escalaras a varios contenedores app:
    # server app_2:9000;
    # server app_3:9000;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # ── Cabeceras de seguridad ───────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Rate limit global (aplica a todas las rutas) ─────────
    limit_req zone=global burst=20 nodelay;
    limit_req_status 429;

    # ── Tamaño máximo de body (subida de media) ───────────────
    client_max_body_size 10M;

    # ── Rutas de autenticación — límite estricto ─────────────
    location ~ ^/api/(login|register|password) {
        limit_req zone=auth burst=3 nodelay;

        try_files $uri /index.php?$query_string;

        fastcgi_pass laravel_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # ── Rutas de escritura (threads, follows) ─────────────────
    location ~ ^/api/(threads|follows) {
        limit_req zone=write burst=10 nodelay;

        # Solo POST/PUT/DELETE pasan por rate limit write;
        # GET no lo necesita (ya tiene global)
        try_files $uri /index.php?$query_string;

        fastcgi_pass laravel_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # ── Resto de rutas API ────────────────────────────────────
    location /api/ {
        try_files $uri /index.php?$query_string;

        fastcgi_pass laravel_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # ── Archivos estáticos — sin pasar a PHP ──────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Bloquear acceso a archivos sensibles ──────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # ── Health check (para Docker / load balancer) ────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}